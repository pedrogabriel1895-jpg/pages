
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard de Leads</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0b1a33;
  color: white;
  text-align: center;
}
.card {
  background: #13254a;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  display: inline-block;
}
</style>
</head>

<body>

<h1>📊 Dashboard de Leads</h1>

<input type="date" id="start">
<input type="date" id="end">
<button onclick="render()">Filtrar</button>

<div id="cards"></div>
<canvas id="chart"></canvas>

<script>

const data = [];
const totals = {};

let chartInstance = null;

function render() {

  const startVal = document.getElementById("start").value;
  const endVal = document.getElementById("end").value;

  const start = startVal ? new Date(startVal) : null;
  const end = endVal ? new Date(endVal) : null;

  const filtered = data.filter(d => {
    const date = new Date(d.d);
    if (!start || !end) return true;
    return date >= start && date <= end;
  });

  const byProject = {};

  filtered.forEach(d => {
    if (!byProject[d.p]) {
      byProject[d.p] = {};
    }

    if (!byProject[d.p][d.d]) {
      byProject[d.p][d.d] = 0;
    }

    byProject[d.p][d.d]++;
  });

  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  Object.keys(totals).forEach(p => {
    cards.innerHTML += '<div class="card"><h3>' + p + '</h3><p>Total Leads: ' + totals[p] + '</p></div>';
  });

  const labels = [...new Set(filtered.map(d => d.d))].sort();

  const datasets = Object.keys(byProject).map(p => ({
    label: p,
    data: labels.map(l => byProject[p][l] || 0),
    fill: false,
    tension: 0.2
  }));

  if (chartInstance) {
    chartInstance.destroy();
  }

  chartInstance = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white" }
        }
      },
      scales: {
        x: {
          ticks: { color: "white" }
        },
        y: {
          ticks: { color: "white" }
        }
      }
    }
  });
}

render();

</script>

</body>
</html>
