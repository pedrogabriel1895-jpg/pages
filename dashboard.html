<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6 text-blue-800">Dashboard de Entradas de Leads</h1>

        <div class="bg-white p-4 rounded-lg shadow-md mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Projeto (ID):</label>
                <select id="projectSelect" class="w-full border rounded p-2 bg-gray-50" onchange="updateDashboard()">
                    <option value="all">Todos os Projetos</option>
                    </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Data Início:</label>
                <input type="date" id="startDate" class="w-full border rounded p-2 bg-gray-50" onchange="updateDashboard()">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Data Fim:</label>
                <input type="date" id="endDate" class="w-full border rounded p-2 bg-gray-50" onchange="updateDashboard()">
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-l-4 border-blue-600">
            <h2 class="text-lg font-semibold text-gray-600">Total de Leads Ativos</h2>
            <p id="totalLeads" class="text-4xl font-bold text-blue-700 mt-2">0</p>
            <p class="text-sm text-gray-500 mt-1">Considerando filtro atual de projeto e período</p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-semibold text-gray-600 mb-4">Volume de Entradas ao Longo do Tempo</h2>
            <canvas id="leadsChart" height="100"></canvas>
        </div>
    </div>

    <script>
        let allData = [];
        let chartInstance = null;

        // Inicializar Gráfico Vazio
        const ctx = document.getElementById('leadsChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Novos Leads',
                    data: [],
                    borderColor: '#2563EB',
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });

        // Carregar e processar o CSV
        Papa.parse('leads_rows.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                
                // Limpar e formatar dados
                allData = data.filter(row => row.considerar === 'true' && row.first_message_at).map(row => {
                    // first_message_at parece ser em segundos (unix), multiplicar por 1000 para milissegundos
                    const dateObj = new Date(parseInt(row.first_message_at) * 1000);
                    return {
                        projeto: row.projeto,
                        dateObj: dateObj,
                        // String no formato YYYY-MM-DD para agrupamento
                        dateStr: dateObj.toISOString().split('T')[0] 
                    };
                });

                // Preencher o select de projetos
                const projectSelect = document.getElementById('projectSelect');
                const uniqueProjects = [...new Set(allData.map(d => d.projeto))];
                uniqueProjects.forEach(proj => {
                    const option = document.createElement('option');
                    option.value = proj;
                    option.text = proj;
                    projectSelect.appendChild(option);
                });

                // Atualizar com os dados iniciais
                updateDashboard();
            },
            error: function(err) {
                console.error("Erro ao ler o CSV: ", err);
                alert("Não foi possível carregar o leads_rows.csv. Certifique-se de que o arquivo está na mesma pasta que o index.html!");
            }
        });

        // Função para filtrar e atualizar os componentes
        function updateDashboard() {
            const selectedProj = document.getElementById('projectSelect').value;
            const startDateStr = document.getElementById('startDate').value;
            const endDateStr = document.getElementById('endDate').value;

            // Filtro de Projeto
            let filteredData = allData;
            if (selectedProj !== 'all') {
                filteredData = filteredData.filter(d => d.projeto === selectedProj);
            }

            // Filtros de Data
            if (startDateStr) {
                const start = new Date(startDateStr);
                // Garantir o início do dia
                start.setHours(0, 0, 0, 0); 
                filteredData = filteredData.filter(d => d.dateObj >= start);
            }
            if (endDateStr) {
                const end = new Date(endDateStr);
                // Fim do dia
                end.setHours(23, 59, 59, 999); 
                filteredData = filteredData.filter(d => d.dateObj <= end);
            }

            // Atualiza KPI Total
            document.getElementById('totalLeads').innerText = filteredData.length;

            // Agrupar por data para o gráfico
            const countsByDate = {};
            filteredData.forEach(d => {
                countsByDate[d.dateStr] = (countsByDate[d.dateStr] || 0) + 1;
            });

            // Ordenar as datas
            const sortedDates = Object.keys(countsByDate).sort();
            const counts = sortedDates.map(date => countsByDate[date]);

            // Formatar datas para exibir bonito (DD/MM/YYYY)
            const labelsFormatadas = sortedDates.map(d => {
                const [year, month, day] = d.split('-');
                return `${day}/${month}/${year}`;
            });

            // Atualizar o gráfico
            chartInstance.data.labels = labelsFormatadas;
            chartInstance.data.datasets[0].data = counts;
            chartInstance.update();
        }
    </script>
</body>
</html>
